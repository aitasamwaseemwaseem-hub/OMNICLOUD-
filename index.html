<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>OmniCloud Ultra X | Premium Edition</title>

<style>
:root {
    --bg: #050a14;
    --card: rgba(24, 34, 52, 0.6);
    --line: rgba(255, 255, 255, 0.05);
    --neon: #00d9ff;
    --grad: linear-gradient(135deg, #8A2BE2, #00d9ff);
    --glass: blur(15px);
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

body {
    background: radial-gradient(circle at top right, #1e1b4b, #050a14);
    color: white;
    display: flex;
    height: 100vh;
    overflow: hidden;
}

/* Background Particles */
.particles span {
    position: fixed; width: 4px; height: 4px; background: var(--neon);
    border-radius: 50%; opacity: 0.3; animation: float 10s linear infinite;
}
@keyframes float { from { transform: translateY(110vh); } to { transform: translateY(-10vh); } }

/* Preloader */
#loader {
    position: fixed; inset: 0; background: #050a14;
    display: flex; align-items: center; justify-content: center;
    z-index: 100000; font-size: 24px; font-weight: 900; color: var(--neon);
    letter-spacing: 5px; text-transform: uppercase;
}

/* Sidebar */
.sidebar {
    width: 280px; background: rgba(10, 15, 30, 0.8);
    backdrop-filter: var(--glass); padding: 30px 20px;
    border-right: 1px solid var(--line); z-index: 100;
}

.logo {
    font-size: 28px; font-weight: 900; background: var(--grad);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-align: center; margin-bottom: 40px; letter-spacing: 2px;
}

.nav-item {
    padding: 14px 20px; margin: 8px 0; border-radius: 12px;
    color: #bbb; cursor: pointer; transition: 0.3s;
}
.nav-item:hover, .nav-item.active { background: rgba(255, 255, 255, 0.05); color: var(--neon); box-shadow: inset 4px 0 0 var(--neon); }

/* Main Content */
.main { flex: 1; padding: 40px; overflow-y: auto; position: relative; scroll-behavior: smooth; }

.header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }

.search-box {
    width: 400px; padding: 14px 25px; border-radius: 30px;
    border: 1px solid var(--line); background: rgba(255, 255, 255, 0.05);
    color: white; outline: none; transition: 0.3s;
}
.search-box:focus { border-color: var(--neon); box-shadow: 0 0 15px rgba(0, 217, 255, 0.2); }

/* Stats & Grid */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-bottom: 40px; }
.stat-card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--line); text-align: center; }
.stat-card h3 { color: var(--neon); font-size: 24px; }

.game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }
.game-card {
    background: var(--card); border-radius: 20px; overflow: hidden;
    transition: 0.4s; border: 1px solid var(--line); position: relative; cursor: pointer;
}
.game-card:hover { transform: translateY(-10px); border-color: var(--neon); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
.game-card img { width: 100%; height: 300px; object-fit: cover; }
.game-overlay { padding: 20px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); position: absolute; bottom: 0; width: 100%; }

/* Modal */
#gameModal {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
    backdrop-filter: blur(10px); justify-content: center; align-items: center; z-index: 9999;
}
.modal-body { background: #0f172a; display: flex; max-width: 1000px; width: 95%; border-radius: 25px; overflow: hidden; border: 1px solid var(--line); animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
.modal-img { width: 55%; object-fit: cover; }
.modal-info { width: 45%; padding: 40px; display: flex; flex-direction: column; }

.game-logo-small { max-width: 150px; margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }

/* Progress Bar */
.progress-bar { height: 6px; background: #233; border-radius: 10px; overflow: hidden; margin: 20px 0; display: none; }
.fill { height: 100%; width: 0%; background: var(--grad); transition: 0.5s ease; }

.play-btn { width: 100%; padding: 16px; border: none; border-radius: 12px; background: var(--grad); color: white; font-weight: 800; cursor: pointer; margin-top: auto; }

@media(max-width: 900px) { body { flex-direction: column; overflow: auto; } .sidebar { width: 100%; } .modal-body { flex-direction: column; } .modal-img, .modal-info { width: 100%; } }
</style>
</head>

<body>

<div id="loader">INITIALIZING OMNICLOUD...</div>

<div class="particles">
    <span style="left:10%; animation-duration:8s"></span>
    <span style="left:30%; animation-duration:12s"></span>
    <span style="left:55%; animation-duration:9s"></span>
    <span style="left:80%; animation-duration:14s"></span>
</div>

<aside class="sidebar">
    <div class="logo">OMNICLOUD X</div>
    <div class="nav-item active">🏠 Dashboard</div>
    <div class="nav-item">🎮 My Library</div>
    <div class="nav-item">🌩️ Servers</div>
    <div class="nav-item">⚙️ Settings</div>
</aside>

<main class="main">
    <div class="header-row">
        <input class="search-box" id="search" placeholder="Search AAA Games...">
        <div style="font-weight: 700;">Welcome, Ahmad | <span style="color:var(--neon)">● Online</span></div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><p>Latency</p><h3>5ms</h3></div>
        <div class="stat-card"><p>FPS</p><h3>240</h3></div>
        <div class="stat-card"><p>Nodes</p><h3>Active</h3></div>
    </div>

    <h2 style="margin-bottom:25px">Featured Games</h2>
    <div class="game-grid" id="grid"></div>
</main>

<div id="gameModal">
    <div class="modal-body">
        <img id="mimg" class="modal-img">
        <div class="modal-info">
            <img id="mlogo" class="game-logo-small">
            <h1 id="mtitle"></h1>
            <p id="mdesc" style="opacity:0.7; margin: 15px 0; line-height: 1.5;"></p>
            <div id="mstars" style="color: #ffcc00; margin-bottom: 10px;"></div>
            
            <div class="progress-bar" id="pBar"><div class="fill" id="fill"></div></div>
            
            <button class="play-btn" onclick="launchGame()" id="launchBtn">INITIALIZE NEURAL STREAM</button>
        </div>
    </div>
</div>

<script>
const games = [
    ["Cyberpunk 2077", "https://images8.alphacoders.com/111/1118654.jpg", "Enter Night City in 4K HDR. Experience the most advanced ray-tracing on cloud.", "https://upload.wikimedia.org/wikipedia/commons/e/e0/Cyberpunk_2077_logo.png", "⭐⭐⭐⭐"],
    ["GTA V", "https://wallpaperaccess.com/full/112613.jpg", "The legend returns. Play Los Santos with zero latency on any device.", "https://upload.wikimedia.org/wikipedia/commons/e/e1/Grand_Theft_Auto_V_logo.png", "⭐⭐⭐⭐⭐"],
    ["Free Fire Max", "https://images.wallpapersden.com/image/download/garena-free-fire-2021_bmZqZ26UmZqaraWkpJRma21lrWdnZ2U.jpg", "Optimized for one-tap shots. Max sensitivity and high DPI profiles active.", "https://upload.wikimedia.org/wikipedia/en/thumb/e/eb/Garena_Free_Fire_logo.png/250px-Garena_Free_Fire_logo.png", "⭐⭐⭐⭐"],
    ["Elden Ring", "https://images6.alphacoders.com/121/1210850.jpg", "Rise, Tarnished. Defeat the demigods with 120 FPS stable streaming.", "https://upload.wikimedia.org/wikipedia/it/thumb/b/b9/Elden_Ring_logo.png/1200px-Elden_Ring_logo.png", "⭐⭐⭐⭐⭐"],
    ["Tekken 8", "https://images2.alphacoders.com/132/1329241.jpeg", "Iron Fist combat. Frame-perfect input sync for competitive play.", "https://upload.wikimedia.org/wikipedia/commons/0/03/Tekken_8_logo.png", "⭐⭐⭐⭐"]
];

function render(arr = games) {
    const grid = document.getElementById('grid');
    grid.innerHTML = "";
    arr.forEach(g => {
        let card = document.createElement("div");
        card.className = "game-card";
        card.innerHTML = `<img src="${g[1]}"><div class="game-overlay"><h3>${g[0]}</h3><small>${g[4]}</small></div>`;
        card.onclick = () => openModal(g);
        grid.appendChild(card);
    });
}

function openModal(g) {
    document.getElementById('mtitle').innerText = g[0];
    document.getElementById('mimg').src = g[1];
    document.getElementById('mdesc').innerText = g[2];
    document.getElementById('mlogo').src = g[3];
    document.getElementById('mstars').innerText = g[4];
    document.getElementById('gameModal').style.display = "flex";
}

function launchGame() {
    const btn = document.getElementById('launchBtn');
    const pBar = document.getElementById('pBar');
    const fill = document.getElementById('fill');
    
    pBar.style.display = "block";
    btn.style.pointerEvents = "none";
    btn.innerText = "ALLOCATING SERVER...";
    
    fill.style.width = "40%";
    setTimeout(() => {
        btn.innerText = "SYNCING CLOUD DATA...";
        fill.style.width = "80%";
        setTimeout(() => {
            fill.style.width = "100%";
            alert("🚀 Launch Success! Streaming " + document.getElementById('mtitle').innerText);
            btn.innerText = "INITIALIZE NEURAL STREAM";
            pBar.style.display = "none";
            fill.style.width = "0%";
            btn.style.pointerEvents = "auto";
        }, 1000);
    }, 1000);
}

document.getElementById('search').oninput = e => {
    let q = e.target.value.toLowerCase();
    render(games.filter(x => x[0].toLowerCase().includes(q)));
};

window.onclick = e => { if(e.target == document.getElementById('gameModal')) document.getElementById('gameModal').style.display = "none"; };

// Hide loader after 1.5s
setTimeout(() => { document.getElementById('loader').style.opacity = "0"; setTimeout(() => { document.getElementById('loader').style.display = "none"; }, 500); }, 1500);

render();
</script>

</body>
</html>
