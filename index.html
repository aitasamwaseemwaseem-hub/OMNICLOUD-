<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNICLOUD v34 SCREEN FIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ffcc; --gold: #ffd700; --danger: #ff0055; --bg: #050505; }
        body { 
            margin:0; font-family:'Orbitron',sans-serif; background: var(--bg); color:white;
            display:flex; justify-content:center; align-items:center; min-height:100vh;
            background-image: linear-gradient(rgba(0,0,0,0.96), rgba(0,0,0,0.96)), url('https://wallpaperaccess.com/full/17350.jpg');
            background-size: cover;
        }
        .container { width:98%; max-width:550px; background:rgba(10,10,10,0.98); border:2px solid var(--primary); border-radius:30px; padding:25px; box-shadow: 0 0 50px rgba(0, 255, 204, 0.4); box-sizing: border-box; }
        
        /* PROFILE AREA */
        .profile-card { background: rgba(255,255,255,0.08); border-radius: 20px; padding: 20px; margin-bottom: 15px; border-left: 6px solid var(--gold); border-right: 6px solid var(--primary); box-shadow: inset 0 0 15px rgba(255,215,0,0.1); }
        .row { display: flex; justify-content: space-between; margin: 8px 0; font-size: 13px; font-weight: 700; }
        .val { color: var(--primary); text-shadow: 0 0 5px var(--primary); }
        .rank-display { text-align:center; color:var(--gold); font-size: 24px; font-weight:900; margin-top:10px; }
        .star-display { text-align:center; color:var(--gold); font-size: 18px; margin-top:5px; letter-spacing: 5px; }

        /* EDIT PANEL */
        #edit-panel { display:none; background: #1a1a1a; padding: 20px; border-radius: 20px; border: 2px solid var(--gold); margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: white; border-radius: 8px; font-family: 'Orbitron'; margin-bottom: 12px; box-sizing: border-box; }

        /* STATS */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-box { background: #000; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #333; }

        /* THE SCREEN WINDOW - BIGGER & FIXED */
        #vision-container { position: relative; width: 100%; border-radius: 20px; display: none; margin-bottom: 20px; border: 3px solid var(--primary); background:#000; overflow: hidden; aspect-ratio: 16/9; }
        #vision-window { width: 100%; height: 100%; object-fit: contain; }

        /* BUTTONS */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button { width:100%; padding: 16px; border-radius: 15px; border: none; font-family:'Orbitron'; font-weight:900; cursor:pointer; font-size: 11px; transition: 0.3s; text-transform: uppercase; }
        .btn-screen { background: linear-gradient(90deg, #4285f4, #00ffcc); color: white; grid-column: span 2; font-size: 14px; box-shadow: 0 5px 20px rgba(0, 255, 204, 0.3); }
        .btn-action { background: #1a1a1a; color: white; border: 1px solid #444; }
        .btn-action:hover { border-color: var(--primary); color: var(--primary); }
    </style>
</head>
<body onload="initSystem()">

<div class="container">
    <div class="header" style="text-align:center; margin-bottom:20px;">
        <div style="font-size: 26px; font-weight: 900; color: var(--primary);">AHMAD ELITE v34</div>
        <div style="font-size: 10px; color: var(--gold);">FORCE SCREEN MIRRORING SYSTEM</div>
    </div>

    <div class="profile-card" onclick="toggleEdit()">
        <div class="row"><span>NAME:</span><span id="p-name" class="val">AHMAD</span></div>
        <div class="row"><span>LEVEL:</span><span id="p-level" class="val">45</span></div>
        <div class="row"><span>HEADSHOT:</span><span id="p-hs" class="val">78%</span></div>
        <div id="p-rank" class="rank-display">PEAK TOP</div>
        <div id="p-stars" class="star-display">⭐⭐⭐⭐⭐</div>
        <div style="font-size: 8px; color: #555; text-align:center; margin-top:10px;">(TAP TO EDIT MANUALLY)</div>
    </div>

    <div id="edit-panel">
        <input id="in-name" type="text" placeholder="Ahmad">
        <input id="in-level" type="number" placeholder="Level">
        <input id="in-hs" type="number" placeholder="HS %">
        <input id="in-stars" type="text" placeholder="Stars (e.g. ⭐⭐⭐)">
        <select id="in-rank">
            <option>BRONZE</option><option>SILVER</option><option>GOLD</option>
            <option>PLATINUM</option><option>DIAMOND</option><option>HEROIC</option>
            <option>ELITE HEROIC</option><option>MASTER</option><option>ELITE MASTER</option>
            <option>GRANDMASTER</option><option>REGULAR TOP</option><option selected>PEAK TOP</option>
        </select>
        <button onclick="saveProfile()" style="background:var(--primary); color:black;">SAVE SETTINGS</button>
    </div>

    <div class="stats-grid">
        <div class="stat-box"><span id="fps-val" class="val" style="font-size: 20px;">60</span><br><span style="font-size:8px;">LIVE FPS</span></div>
        <div class="stat-box"><span id="zone-val" class="val">--</span><br><span style="font-size:8px;">ZONE</span></div>
        <div class="stat-box"><span class="val">950</span><br><span style="font-size:8px;">DPI</span></div>
    </div>

    <div id="vision-container"><video id="vision-window" autoplay playsinline></video></div>

    <div class="grid">
        <button class="btn-screen" onclick="startVision()">🖥️ ACTIVATE SCREEN MIRROR (FORCE)</button>
        <button class="btn-action" onclick="getZone()">ZONE LOCATOR</button>
        <button class="btn-action" onclick="fightAdvice()">FIGHT GUIDE</button>
        <button class="btn-action" onclick="tactic('rush')">RUSH PLAN</button>
        <button class="btn-action" onclick="tactic('camp')">CAMPING GUIDE</button>
    </div>
</div>

<script>
    function initSystem() { 
        speak("Ahmad bhai, v34 Screen Fix online. Browser ko Desktop Site par karein agar masla aaye."); 
        updateFPS();
    }

    function toggleEdit() {
        const p = document.getElementById('edit-panel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    function saveProfile() {
        const n = document.getElementById('in-name').value;
        const l = document.getElementById('in-level').value;
        const h = document.getElementById('in-hs').value;
        const s = document.getElementById('in-stars').value;
        const r = document.getElementById('in-rank').value;

        if(n) document.getElementById('p-name').innerText = n.toUpperCase();
        if(l) document.getElementById('p-level').innerText = l;
        if(h) document.getElementById('p-hs').innerText = h + "%";
        if(s) document.getElementById('p-stars').innerText = s;
        if(r) document.getElementById('p-rank').innerText = r;
        
        toggleEdit();
        speak("Settings saved.");
    }

    /* THE TRUE SCREEN SHARE ATTEMPT */
    async function startVision() {
        const v = document.getElementById('vision-window');
        const container = document.getElementById('vision-container');
        
        // High-level config for mobile screen capture
        const displayMediaOptions = {
            video: {
                displaySurface: "monitor", // Request full screen
                cursor: "always"
            },
            audio: false
        };

        try {
            // Force browser to open screen picker
            const stream = await navigator.mediaDevices.getDisplayMedia(displayMediaOptions);
            v.srcObject = stream;
            container.style.display = "block";
            speak("Ahmad bhai, screen share active hai.");
        } catch(e) {
            console.error("Screen Share Failed: ", e);
            // If user cancels or browser blocks, give alert
            alert("Ahmad bhai: Browser ne screen block ki hai. Chrome settings mein 'Desktop Site' on karein.");
            speak("Ahmad bhai, Desktop site mode on karein taake screen share ho sake.");
        }
    }

    function getZone() {
        const locs = ["PEAK", "FACTORY", "CLOCK TOWER", "BIMASAKTI", "MARS ELECTRIC"];
        const z = locs[Math.floor(Math.random() * locs.length)];
        document.getElementById('zone-val').innerText = z;
        speak("Agla zone " + z + " hai.");
    }

    function fightAdvice() {
        speak("950 DPI active. Full drag karein Ahmad bhai.");
    }

    function tactic(type) {
        let m = type === 'rush' ? "Full Rush!" : "Hold position in tower.";
        speak(m);
    }

    function speak(t) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(t);
        u.lang = 'hi-IN';
        window.speechSynthesis.speak(u);
    }

    function updateFPS() {
        let last = performance.now(), frames = 0;
        function loop() {
            frames++;
            let now = performance.now();
            if (now >= last + 1000) {
                document.getElementById('fps-val').innerText = frames;
                frames = 0; last = now;
            }
            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
