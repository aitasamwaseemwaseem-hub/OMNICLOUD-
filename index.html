<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNICLOUD ULTIMATE AI v10.0</title>
    <style>
        :root {
            --primary: #00ffcc;
            --danger: #ff0055;
            --warning: #ffcc00;
            --master: #bc13fe;
            --heroic: #ff4d4d;
            --region-gm: #ff0000;
            --bg: #050505;
        }

        body { 
            background-color: var(--bg); color: #fff; 
            font-family: 'Orbitron', sans-serif; 
            margin: 0; padding: 10px; overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center; 
        }

        .container {
            width: 100%; max-width: 400px;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            border: 2px solid var(--primary); border-radius: 25px; padding: 20px;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.2); box-sizing: border-box;
        }

        /* 4. Easy Edit Panel */
        #input-panel {
            background: #111; border: 1px solid var(--warning); 
            padding: 15px; border-radius: 15px; margin-bottom: 15px; display: none;
        }

        input, select {
            width: 100%; padding: 12px; margin: 8px 0;
            background: #222; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .logo { font-size: 18px; font-weight: 900; color: var(--primary); text-shadow: 0 0 10px var(--primary); letter-spacing: 2px; }

        /* 1. Ranking System Visuals */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .card { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 15px; text-align: center; border: 1px solid #333; }
        .val { font-size: 12px; font-weight: bold; margin-top: 5px; text-transform: uppercase; }

        .glow-gm { color: var(--region-gm); text-shadow: 0 0 20px var(--region-gm); animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.6; } }

        .ai-guide { 
            background: rgba(0, 255, 204, 0.05); border-left: 4px solid var(--primary); 
            padding: 15px; border-radius: 12px; margin-bottom: 15px; min-height: 70px;
        }

        .btn-main { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; margin-top: 10px; }
        .btn-edit { background: #222; color: var(--warning); border: 1px solid var(--warning); margin-bottom: 15px; font-size: 10px; }
        .btn-vision { background: #4285f4; color: white; box-shadow: 0 0 15px rgba(66, 133, 244, 0.4); }
        .btn-voice { background: linear-gradient(45deg, var(--danger), var(--master)); color: white; }

        /* 3. Tactical Decision Buttons */
        .tactical-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .btn-t { background: #111; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 9px; font-family: 'Orbitron'; transition: 0.2s; }
        .btn-t:hover { border-color: var(--primary); background: rgba(0, 255, 204, 0.1); }
    </style>
</head>
<body onload="loadData()">

<div class="container">
    <div class="header">
        <div class="logo">OMNICLOUD ULTIMATE AI</div>
        <button class="btn-main btn-edit" onclick="toggleEdit()">⚙️ SYSTEM SETTINGS</button>
    </div>

    <div id="input-panel">
        <input type="text" id="newName" placeholder="Enter Name (e.g. Ahmad)">
        <select id="newRank">
            <option value="bronze">BRONZE</option>
            <option value="silver">SILVER</option>
            <option value="gold">GOLD</option>
            <option value="platinum">PLATINUM</option>
            <option value="diamond">DIAMOND</option>
            <option value="heroic">HEROIC</option>
            <option value="elite-heroic">ELITE HEROIC</option>
            <option value="master">MASTER</option>
            <option value="elite-master">ELITE MASTER</option>
            <option value="grandmaster">GRANDMASTER</option>
            <option value="elite-grandmaster">ELITE GRANDMASTER</option>
            <option value="region-gm">REGION GRANDMASTER</option>
        </select>
        <input type="number" id="newStars" placeholder="Stars (★)">
        <input type="number" id="newHS" placeholder="Headshot Rate %">
        <button class="btn-main" style="background:var(--primary); color:#000;" onclick="saveData()">SYNC SYSTEM</button>
    </div>

    <div class="stats-grid">
        <div class="card">
            <div style="font-size: 8px; color: #888;">PLAYER NAME</div>
            <div class="val" id="dispName">AHMAD</div>
        </div>
        <div class="card">
            <div style="font-size: 8px; color: #888;">RANK & STARS</div>
            <div class="val" id="dispRank">MASTER</div>
            <div id="dispStars" style="color:var(--warning); font-size: 13px;">★ 0</div>
        </div>
    </div>

    <button class="btn-main btn-vision" onclick="startVision()">🖥️ SCAN SCREEN (VISION)</button>

    <div class="ai-guide">
        <span style="font-size: 9px; color: var(--primary); font-weight: bold;">AI HINDI GUIDE:</span>
        <div id="ai-speech" style="font-size: 12px; margin-top: 5px; font-style: italic; line-height: 1.4;">Ahmad bhai, I am watching...</div>
    </div>

    <div class="tactical-grid">
        <button class="btn-t" onclick="getAdvice('rush')">RUSH PLAN</button>
        <button class="btn-t" onclick="getAdvice('camp')">CAMPING SPOT</button>
        <button class="btn-t" onclick="getAdvice('zone')">ZONE SHIFT</button>
        <button class="btn-t" onclick="getAdvice('kill')">KILL CHANCE</button>
    </div>

    <button class="btn-main btn-voice" onclick="startVoice()">🎤 TALK TO AI PARTNER</button>
</div>

<script>
    function toggleEdit() {
        const panel = document.getElementById('input-panel');
        panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
    }

    // 5. Memory System (LocalStorage)
    function saveData() {
        const n = document.getElementById('newName').value;
        const r = document.getElementById('newRank').value;
        const s = document.getElementById('newStars').value;
        const h = document.getElementById('newHS').value;

        if(n) localStorage.setItem('v10_n', n);
        if(r) localStorage.setItem('v10_r', r);
        if(s) localStorage.setItem('v10_s', s);
        if(h) localStorage.setItem('v10_h', h);

        loadData();
        toggleEdit();
        if(window.navigator.vibrate) window.navigator.vibrate(50);
    }

    function loadData() {
        const name = localStorage.getItem('v10_n') || "AHMAD";
        const rank = localStorage.getItem('v10_r') || "master";
        const stars = localStorage.getItem('v10_s') || "0";
        
        document.getElementById('dispName').innerText = name.toUpperCase();
        document.getElementById('dispStars').innerText = "★ " + stars;
        
        const rb = document.getElementById('dispRank');
        rb.innerText = rank.replace('-', ' ').toUpperCase();
        rb.className = "val";

        if(rank.includes('grandmaster')) rb.classList.add('glow-gm');
        
        document.getElementById('ai-speech').innerText = name + " bhai, link established. Ready for Booyah!";
    }

    // 2 & 3. AI Hybrid Guide Logic (Hindi + English)
    function getAdvice(type) {
        const speech = document.getElementById('ai-speech');
        const name = localStorage.getItem('v10_n') || "Ahmad";
        const hs = parseInt(localStorage.getItem('v10_h') || "55");
        
        let msg = "";
        if(type === 'rush') msg = name + " bhai, scan ke mutabiq enemy ki health kam hai. Foran right side se wall laga kar Rush kar do!";
        else if(type === 'camp') msg = "Safe survival ke liye Factory ki chath ya Peak ka tuta hua ghar best hai. Wahan Camp karo.";
        else if(type === 'zone') msg = "Next zone 80 percent chance hai ke Clock Tower ki taraf banay ga. Jaldi rotate karo!";
        else if(type === 'kill') {
            msg = (hs > 60) ? "Ahmad, aapka headshot rate " + hs + "% hai. Bindas shot lo, kill pakka hoga!" : "Accuracy kam hai bhai, pehle grenade phenko phir fight lo.";
        }
        
        speech.innerText = msg;
        speakBack(msg);
        if(window.navigator.vibrate) window.navigator.vibrate(30);
    }

    // Speaking Engine (Hindi Voice)
    function speakBack(text) {
        const synth = window.speechSynthesis;
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'hi-IN'; // Sets voice to Hindi/Urdu style
        utter.rate = 1.0;
        synth.speak(utter);
    }

    // Gemini-Style Screen Capture
    async function startVision() {
        const speech = document.getElementById('ai-speech');
        try {
            await navigator.mediaDevices.getDisplayMedia({ video: true });
            speech.innerText = "Vision connected! Main aapka game dekh raha hoon.";
            speakBack("Ahmad bhai, screen link ho gayi hai. Main game dekh raha hoon.");
        } catch (err) {
            speech.innerText = "Vision permission denied.";
        }
    }

    // Listening Engine (Hindi Input)
    function startVoice() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return alert("Browser not supported!");
        const rec = new SpeechRecognition();
        rec.lang = 'hi-IN'; 
        document.getElementById('ai-speech').innerText = "Ahmad bhai, boliye main sun raha hoon...";
        rec.onresult = function(e) {
            const cmd = e.results[0][0].transcript.toLowerCase();
            if(cmd.includes('rush')) getAdvice('rush');
            else if(cmd.includes('camp')) getAdvice('camp');
            else getAdvice('kill');
        };
        rec.start();
    }
</script>
</body>
</html>
