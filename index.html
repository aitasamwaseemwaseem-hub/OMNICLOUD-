<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNICLOUD v32 STAR EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ffcc; --gold: #ffd700; --danger: #ff0055; --bg: #050505; }
        body { 
            margin:0; font-family:'Orbitron',sans-serif; background: var(--bg); color:white;
            display:flex; justify-content:center; align-items:center; min-height:100vh;
            background-image: linear-gradient(rgba(0,0,0,0.95), rgba(0,0,0,0.95)), url('https://wallpaperaccess.com/full/17350.jpg');
            background-size: cover; background-position: center;
        }
        .container { width:98%; max-width:500px; background:rgba(10,10,10,0.98); border:2px solid var(--primary); border-radius:30px; padding:25px; box-shadow: 0 0 40px rgba(0, 255, 204, 0.4); box-sizing: border-box; }
        
        /* PROFILE SECTION */
        .profile-card { background: rgba(255,255,255,0.07); border-radius: 20px; padding: 20px; margin-bottom: 15px; border-left: 6px solid var(--gold); }
        .row { display: flex; justify-content: space-between; margin: 8px 0; font-size: 13px; }
        .val { color: var(--primary); font-weight: bold; }
        .rank-title { text-align:center; color:var(--gold); font-size: 20px; font-weight:900; margin-top:10px; }
        .star-val { text-align:center; color:var(--gold); font-size: 16px; margin-top:5px; letter-spacing: 2px; }

        /* EDIT PANEL */
        #edit-panel { display:none; background: #1a1a1a; padding: 20px; border-radius: 20px; border: 1px solid var(--gold); margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: white; border-radius: 8px; font-family: 'Orbitron'; margin-bottom: 12px; box-sizing: border-box; }

        /* VISION WINDOW */
        #vision-window { width: 100%; border-radius: 20px; display: none; margin-bottom: 20px; border: 2px solid var(--primary); background:#000; aspect-ratio: 16/9; }

        /* STATS BOXES */
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-box { background: #000; padding: 12px; border-radius: 12px; text-align: center; border: 1px solid #222; }

        /* BUTTONS */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { width:100%; padding: 15px; border-radius: 12px; border: none; font-family:'Orbitron'; font-weight:900; cursor:pointer; font-size: 10px; transition: 0.3s; }
        .btn-screen { background: #4285f4; color: white; grid-column: span 2; font-size: 12px; }
        .btn-action { background: #1a1a1a; color: white; border: 1px solid #444; }
        .btn-voice { background: linear-gradient(45deg, var(--danger), #bc13fe); color: white; margin-top: 15px; grid-column: span 2; height: 50px; }
    </style>
</head>
<body onload="initSystem()">

<div class="container">
    <div class="header" style="text-align:center; margin-bottom:20px;">
        <div style="font-size: 22px; font-weight: 900; color: var(--primary);">OMNICLOUD v32 PRO</div>
        <div style="font-size: 9px; color: var(--gold);">MANUAL STARS & SCREEN FIX</div>
    </div>

    <div class="profile-card" onclick="toggleEdit()">
        <div class="row"><span>PLAYER NAME:</span><span id="p-name" class="val">AHMAD</span></div>
        <div class="row"><span>PLAYER LEVEL:</span><span id="p-level" class="val">45</span></div>
        <div class="row"><span>HEADSHOT RATE:</span><span id="p-hs" class="val">78%</span></div>
        <div id="p-rank" class="rank-title">MASTER</div>
        <div id="p-stars" class="star-val">⭐⭐⭐</div>
        <div style="font-size: 8px; color: #888; text-align:center; margin-top:8px;">(TAP TO EDIT NAME/RANK/STARS)</div>
    </div>

    <div id="edit-panel">
        <input id="in-name" type="text" placeholder="Edit Name">
        <input id="in-level" type="number" placeholder="Edit Level">
        <input id="in-hs" type="number" placeholder="Edit HS %">
        <input id="in-stars" type="text" placeholder="Enter Stars (e.g. ⭐⭐⭐⭐⭐)">
        <select id="in-rank">
            <option>BRONZE</option><option>SILVER</option><option>GOLD</option>
            <option>PLATINUM</option><option>DIAMOND</option><option>HEROIC</option>
            <option>ELITE HEROIC</option><option selected>MASTER</option><option>ELITE MASTER</option>
            <option>GRANDMASTER</option><option>REGULAR TOP</option><option>PEAK TOP</option>
        </select>
        <button onclick="saveProfile()" style="background:var(--primary); color:black;">SAVE ALL CHANGES</button>
    </div>

    <div class="stats-row">
        <div class="stat-box"><span id="fps-val" class="val">60</span><br><span style="font-size:8px;">FPS</span></div>
        <div class="stat-box"><span id="zone-val" class="val">READY</span><br><span style="font-size:8px;">ZONE</span></div>
        <div class="stat-box"><span class="val">950</span><br><span style="font-size:8px;">DPI</span></div>
    </div>

    <div style="background:rgba(0,255,204,0.05); padding:12px; border-radius:12px; font-size:11px; margin-bottom:15px; border-left:4px solid var(--primary);">
        AI: <span id="ai-speech">Ahmad bhai, star aur screen system up to date hai.</span>
    </div>

    <video id="vision-window" autoplay playsinline></video>

    <div class="grid">
        <button class="btn-screen" onclick="startVision()">🖥️ START SCREEN SHARE (DESKTOP MODE)</button>
        <button class="btn-action" onclick="getZone()">ZONE LOCATOR</button>
        <button class="btn-action" onclick="fightAdvice()">FIGHT GUIDE</button>
        <button class="btn-action" onclick="tactic('rush')">RUSH PLAN</button>
        <button class="btn-action" onclick="tactic('camp')">CAMPING</button>
        <button class="btn-voice" onclick="voiceCommand()">🎤 VOICE COMMAND (HINDI)</button>
    </div>
</div>

<script>
    function initSystem() { 
        speak("Ahmad bhai, v32 online. Stars manual edit kar sakte hain."); 
        updateFPS();
    }

    function toggleEdit() {
        const p = document.getElementById('edit-panel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    function saveProfile() {
        const n = document.getElementById('in-name').value;
        const l = document.getElementById('in-level').value;
        const h = document.getElementById('in-hs').value;
        const s = document.getElementById('in-stars').value;
        const r = document.getElementById('in-rank').value;

        if(n) document.getElementById('p-name').innerText = n.toUpperCase();
        if(l) document.getElementById('p-level').innerText = l;
        if(h) document.getElementById('p-hs').innerText = h + "%";
        if(s) document.getElementById('p-stars').innerText = s;
        if(r) document.getElementById('p-rank').innerText = r;
        
        toggleEdit();
        speak("Ahmad bhai, profile update ho gayi.");
    }

    async function startVision() {
        const video = document.getElementById('vision-window');
        try {
            // First Priority: Desktop Screen Share
            const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            video.srcObject = stream;
            video.style.display = "block";
            updateAI("Screen Share Active!");
            speak("Ahmad bhai, screen share shuru ho gayi.");
        } catch(e) {
            try {
                // Fallback: Camera (Ahmad's mobile mode)
                const cam = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = cam;
                video.style.display = "block";
                updateAI("Camera Active. Scan the screen.");
                speak("Browser ne block kiya hai, camera se scan karein.");
            } catch(err) {
                updateAI("Permission Denied.");
            }
        }
    }

    function getZone() {
        const locs = ["PEAK", "FACTORY", "CLOCK TOWER", "BIMASAKTI", "POCHINOK"];
        const z = locs[Math.floor(Math.random() * locs.length)];
        document.getElementById('zone-val').innerText = z;
        updateAI("Next zone " + z + ".");
        speak("Ahmad bhai, agla zone " + z + " hai.");
    }

    function fightAdvice() {
        let fps = parseInt(document.getElementById('fps-val').innerText);
        let m = fps > 50 ? "System smooth hai. Rush karo!" : "Lag detected. Hold karein.";
        updateAI(m); speak(m);
    }

    function tactic(type) {
        let m = type === 'rush' ? "Full Rush Ahmad bhai!" : "Camping spot hold karein.";
        updateAI(m); speak(m);
    }

    function updateAI(t) { document.getElementById('ai-speech').innerText = t; }
    function speak(t) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(t);
        u.lang = 'hi-IN';
        window.speechSynthesis.speak(u);
    }

    function updateFPS() {
        let last = performance.now(), frames = 0;
        function loop() {
            frames++;
            let now = performance.now();
            if (now >= last + 1000) {
                document.getElementById('fps-val').innerText = frames;
                frames = 0; last = now;
            }
            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
    }

    function voiceCommand() {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(!SR) return;
        let rec = new SR(); rec.lang = "hi-IN";
        updateAI("Bolye Ahmad bhai...");
        rec.onresult = (e) => {
            let cmd = e.results[0][0].transcript.toLowerCase();
            if(cmd.includes("zone")) getZone();
            else if(cmd.includes("rush")) tactic('rush');
        };
        rec.start();
    }
</script>
</body>
</html>
