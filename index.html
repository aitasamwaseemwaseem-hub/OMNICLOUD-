<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNICLOUD v44 AUTO-STAR</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ffcc; --gold: #ffd700; --bg: #050505; }
        body { 
            margin:0; font-family:'Orbitron',sans-serif; background: var(--bg); color:white;
            display:flex; justify-content:center; align-items:center; min-height:100vh;
            background-image: linear-gradient(rgba(0,0,0,0.96), rgba(0,0,0,0.96)), url('https://wallpaperaccess.com/full/17350.jpg');
            background-size: cover;
        }
        .container { width:95%; max-width:450px; background:rgba(10,10,10,0.95); border:2px solid var(--primary); border-radius:30px; padding:20px; box-sizing: border-box; box-shadow: 0 0 40px rgba(0, 255, 204, 0.2); }
        
        .sensor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .sensor-box { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; border: 1px solid #333; text-align: center; }
        .sensor-val { color: var(--primary); font-weight: 900; font-size: 18px; display: block; }
        .sensor-label { font-size: 8px; color: #888; text-transform: uppercase; }

        .profile-card { background: rgba(255,255,255,0.08); border-radius: 20px; padding: 15px; margin-bottom: 15px; border-left: 6px solid var(--gold); border-right: 6px solid var(--primary); cursor: pointer; }
        .rank-display { text-align:center; color:var(--gold); font-size: 22px; font-weight:900; text-transform: uppercase; margin-top:5px; }
        #p-stars { text-align:center; color:var(--gold); letter-spacing:5px; font-size:16px; margin-top:5px; height: 20px; }

        #edit-panel { display:none; background: #1a1a1a; padding: 15px; border-radius: 20px; border: 2px solid var(--gold); margin-bottom: 15px; }
        input, select { width: 100%; padding: 10px; background: #000; border: 1px solid #444; color: white; border-radius: 8px; font-family: 'Orbitron'; margin-bottom: 10px; box-sizing: border-box; font-size: 12px; }

        #vision-container { width: 100%; border-radius: 20px; display: none; margin-bottom: 15px; border: 2px solid var(--primary); background:#000; aspect-ratio: 16/9; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; }

        .btn-multi { background: linear-gradient(90deg, #4285f4, var(--primary)); color: white; width:100%; height: 60px; font-size: 11px; border-radius: 15px; border: none; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; margin-bottom: 10px; }
        .btn-talk { background: linear-gradient(45deg, #ff0055, #bc13fe); color: white; width: 100%; height: 50px; border-radius: 15px; border: none; font-family: 'Orbitron'; font-weight: 900; margin-bottom: 10px; cursor: pointer; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-action { background: #1a1a1a; color: white; border: 1px solid #444; padding: 12px; border-radius: 12px; font-family: 'Orbitron'; font-weight: 900; font-size: 9px; cursor: pointer; }
    </style>
</head>
<body onload="initSystem()">

<div class="container">
    <div style="text-align:center; margin-bottom:15px;">
        <div style="font-size: 20px; font-weight: 900; color: var(--primary);">AHMAD OMNICLOUD v44</div>
        <div style="font-size: 8px; color: var(--gold);">AUTO-STAR & TACTICAL AI</div>
    </div>

    <div class="sensor-grid">
        <div class="sensor-box"><span id="fps-val" class="sensor-val">--</span><span class="sensor-label">FPS</span></div>
        <div class="sensor-box"><span id="speed-val" class="sensor-val">--</span><span class="sensor-label">Speed</span></div>
    </div>

    <div class="profile-card" onclick="toggleEdit()">
        <div style="display:flex; justify-content:space-between; font-size:10px;">
            <span>PLAYER: <span id="p-name" style="color:var(--primary)">AHMAD</span></span>
            <span>LVL: <span id="p-lvl" style="color:var(--primary)">45</span></span>
        </div>
        <div id="p-rank" class="rank-display">PEAK TOP</div>
        <div id="p-stars">⭐⭐⭐⭐⭐</div>
    </div>

    <div id="edit-panel">
        <input id="in-name" type="text" placeholder="New Name">
        <input id="in-lvl" type="number" placeholder="New Level">
        <input id="in-star-num" type="number" placeholder="How many Stars? (1-10)" min="1" max="10">
        <select id="in-rank">
            <option>Bronze</option><option>Silver</option><option>Gold</option>
            <option>Platinum</option><option>Diamond</option><option>Heroic</option>
            <option>Elite Heroic</option><option>Master</option><option>Elite Master</option>
            <option>Grandmaster</option><option>Regular Top</option><option selected>Peak Top</option>
        </select>
        <button onclick="saveProfile()" style="background:var(--primary); width:100%; padding:10px; border-radius:10px; font-weight:900; border:none; cursor:pointer;">UPDATE SYSTEM</button>
    </div>

    <div id="vision-container"><video id="vision-window" autoplay playsinline muted></video></div>

    <button class="btn-multi" id="multiBtn">🖥️ VISION CONTROL<br><span style="font-size:7px;">(1x Cam | 2x Screen | 3x Stop)</span></button>

    <button class="btn-talk" onclick="startVoiceAI()">🎤 TALK TO AI</button>
    
    <div class="action-grid">
        <button class="btn-action" onclick="tactical('fight')">FIGHT GUIDE</button>
        <button class="btn-action" onclick="tactical('camp')">CAMPING GUIDE</button>
        <button class="btn-action" onclick="tactical('zone')">NEXT ZONE</button>
        <button class="btn-action" onclick="tactical('rush')">RUSH TACTIC</button>
    </div>
</div>

<script>
    let clickCount = 0; let clickTimer = null; let activeStream = null;

    function initSystem() { 
        startFPS(); startSpeed(); 
        speak("Ahmad bhai, auto star system update ho gaya hai.");
    }

    function startFPS() {
        let last = performance.now(); let frames = 0;
        function loop() {
            frames++; let now = performance.now();
            if (now >= last + 1000) { document.getElementById('fps-val').innerText = frames; frames = 0; last = now; }
            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
    }

    function startSpeed() {
        setInterval(() => { if (navigator.connection) document.getElementById('speed-val').innerText = navigator.connection.downlink; }, 2000);
    }

    // --- VISION ---
    document.getElementById('multiBtn').addEventListener('click', function() {
        clickCount++; if (clickTimer) clearTimeout(clickTimer);
        clickTimer = setTimeout(() => {
            if (clickCount === 1) handleVision('camera');
            else if (clickCount === 2) handleVision('screen');
            else if (clickCount === 3) handleVision('stop');
            clickCount = 0;
        }, 400);
    });

    async function handleVision(type) {
        const v = document.getElementById('vision-window');
        const container = document.getElementById('vision-container');
        if (type === 'stop') { if (activeStream) activeStream.getTracks().forEach(t => t.stop()); container.style.display = "none"; return; }
        try {
            if (type === 'camera') activeStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            else if (type === 'screen') activeStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            v.srcObject = activeStream; container.style.display = "block";
        } catch (e) { alert("Use Chrome Desktop Site!"); }
    }

    // --- EDIT LOGIC (AUTO STARS) ---
    function toggleEdit() {
        let p = document.getElementById('edit-panel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    function saveProfile() {
        const n = document.getElementById('in-name').value;
        const l = document.getElementById('in-lvl').value;
        const r = document.getElementById('in-rank').value;
        const sCount = document.getElementById('in-star-num').value;

        if(n) document.getElementById('p-name').innerText = n.toUpperCase();
        if(l) document.getElementById('p-lvl').innerText = l;
        if(r) document.getElementById('p-rank').innerText = r.toUpperCase();
        
        // Auto Star Generator
        if(sCount) {
            let stars = "";
            for(let i=0; i<sCount; i++) { stars += "⭐"; }
            document.getElementById('p-stars').innerText = stars;
        }

        toggleEdit();
        speak("Dashboard updated Ahmad bhai.");
    }

    function tactical(mode) {
        let msg = mode === 'rush' ? "Full rush kar do!" : mode === 'camp' ? "Hold karo abhi." : mode === 'zone' ? "Next zone Peak side hai." : "Cover se maaro.";
        speak(msg);
    }

    function startVoiceAI() {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(!SR) return;
        const rec = new SR(); rec.lang = 'hi-IN';
        rec.onresult = (e) => {
            let cmd = e.results[0][0].transcript.toLowerCase();
            if(cmd.includes("kaise ho")) speak("Main fit hoon bhai!");
            else if(cmd.includes("rush")) tactical('rush');
        };
        rec.start();
    }

    function speak(t) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(t); u.lang = 'hi-IN';
        window.speechSynthesis.speak(u);
    }
</script>
</body>
</html>
